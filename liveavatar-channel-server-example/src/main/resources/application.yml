server:
  port: 8080

spring:
  application:
    name: liveavatar-channel-server-example

# Avatar Channel configuration
avatar:
  # Platform dispatcher API
  api:
    base-url: https://facemarket.ai
    # API Key from console → API Key Management. Must be kept server-side only.
    key: lk_live_WbFb9JZvbAWhReOZ2qPdMmzrHW7puYA5BRAmBxBW9dU

  # Default avatar ID (used when /api/session/start is called without avatarId)
  id: avatar_01k56rnqaz15fz4t0ha4ja1132

  # Set to true to route sessions to the sandbox environment (30 free min/month).
  # Adds X-Env-Sandbox: true header to platform dispatcher API calls.
  sandbox:
    enabled: false

  asr:
    # false = Platform ASR: platform handles ASR, developer receives input.text
    # true  = Developer ASR / Omni (default): developer receives raw audio frames, runs VAD+ASR internally
    developer-enabled: true

  tts:
    # false = Platform TTS (default): developer sends text, platform synthesizes audio
    # true  = Developer TTS: developer sends synthesized audio frames directly
    developer-enabled: false

logging:
  level:
    root: INFO
    com.newportai.liveavatar.channel.server: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
