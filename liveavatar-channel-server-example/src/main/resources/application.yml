server:
  port: 8080

spring:
  application:
    name: liveavatar-channel-server-example

# Avatar Channel configuration
avatar:
  # inbound  = Developer connects to platform WS (agentWsUrl). agentToken validation enabled.
  # outbound = Platform connects to developer WS. agentToken validation skipped.
  mode: inbound

  # Set to true to route sessions to the sandbox environment (30 free min/month).
  # Adds X-Env-Sandbox: true header to platform dispatcher API calls.
  sandbox:
    enabled: false

  asr:
    # true  = Scenario 2B (Developer ASR / Omni): this server owns VAD + ASR.
    #         The platform continuously forwards raw audio Binary Frames; the server
    #         runs VAD/ASR internally and sends input.voice.* / input.asr.* back to
    #         the platform, then triggers the AI response.
    # false = Scenario 2A (Platform ASR): the platform handles VAD + ASR and sends
    #         input.voice.* / input.asr.* events to this server as JSON messages.
    #         Raw audio Binary Frames are not forwarded by the platform in this mode;
    #         any that arrive are ignored. This server processes input.text only.
    developer-enabled: true

  tts:
    # true  = Developer TTS: this server owns TTS. After sending response.chunk / response.done
    #         it pushes TTS audio Binary Frames to the platform, wrapped with
    #         response.audio.start and response.audio.finish. Do NOT send response.start.
    # false = Platform TTS: the platform owns TTS. This server sends response.start (with
    #         audio config) so the platform knows how to synthesise speech, then sends
    #         response.chunk / response.done (text only). The platform will send
    #         response.audio.start and response.audio.finish back to this server when
    #         audio playback starts and ends.
    developer-enabled: true

logging:
  level:
    root: INFO
    com.newportai.liveavatar.channel.server: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
